project:
  type: website
  output-dir: docs    # Option A: publish /docs on main
  resources:
    - files/**
    - assets/**
    - robots.txt
    
website:
  title: "Evidence-Based Engineering"
  site-url: "https://vincepileggi.github.io/engineering-stats/"

  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Projects"
        href: projects/index.qmd
      - text: "Publications"
        href: publications.qmd
      - text: "Resources"
        href: resources.qmd

    right:
      - icon: github
        href: "https://github.com/VincePileggi/engineering-stats"

  search: true
  page-navigation: true

format:
  html:
    theme: cosmo
    toc: true
    smooth-scroll: true
    page-footer:
      left: "© 2024 Vince Pileggi"
      center: "Evidence-Based Engineering"
      right: "Built with Quarto"  
    number-sections: false
    css: styles.css
    include-before-body: notice.html
