project:
  type: website
  output-dir: docs    # Option A: publish /docs on main
  resources:
    - files/**
    - assets/**
    - robots.txt
    
website:
  title: "Engineering Stats"
  site-url: https://VincePileggi.github.io/engineering-stats/
  navbar:
    left:
      - text: "Home"
        href: index.qmd
      - text: "About"
        href: about.qmd
      - text: "Reports"
        href: reports.qmd
    right:
      - icon: github
        href: https://github.com/VincePileggi/engineering-stats
